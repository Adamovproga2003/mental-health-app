services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mental
      POSTGRES_PASSWORD: mental_pass
      POSTGRES_DB: mental_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mental -d mental_health"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mental:mental_pass@db:5432/mental_health
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-me-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  migrate:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://mental:mental_pass@db:5432/mental_health
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: alembic upgrade head
    profiles: ["tools"]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
